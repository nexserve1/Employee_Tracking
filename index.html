<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexServe IT Solutions — EMS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f4f6fb;--bg2:#fff;--bg3:#f0f2f7;
--text:#1a1d23;--text2:#5a6270;--text3:#9ba3b0;
--border:#e2e6ed;--border2:#c8cdd8;
--primary:#4f46e5;--primary-light:#ede9ff;--primary-dark:#3730a3;
--success:#10b981;--success-light:#d1fae5;
--danger:#ef4444;--danger-light:#fee2e2;
--warn:#f59e0b;--warn-light:#fef3c7;
--info:#3b82f6;--info-light:#dbeafe;
--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
--shadow2:0 4px 16px rgba(0,0,0,.1);
--radius:10px;--radius2:14px;
--sidebar:240px;
}
[data-theme="dark"]{
--bg:#0f1117;--bg2:#1a1d27;--bg3:#12151e;
--text:#e8eaf0;--text2:#9ba3b5;--text3:#5a6270;
--border:#2a2d3a;--border2:#3a3d4a;
--primary:#6366f1;--primary-light:#1e1b4b;--primary-dark:#818cf8;
--success-light:#064e3b;--danger-light:#450a0a;--warn-light:#451a03;--info-light:#1e3a5f;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;transition:background .2s,color .2s}
a{color:var(--primary);text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:14px;border:none;outline:none}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;width:100%;outline:none;transition:border .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-weight:500;color:var(--text2);margin-bottom:4px;font-size:13px}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .25s}
#sidebar.collapsed{width:0;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* Sidebar */
.logo{padding:18px 20px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:34px;height:34px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:700;color:var(--text);line-height:1.2}
.logo-sub{font-size:11px;color:var(--text3);font-weight:400}
nav{padding:12px 0;flex:1}
.nav-section{padding:8px 16px 4px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:var(--text2);border-radius:0;cursor:pointer;transition:background .15s,color .15s;font-size:13.5px;white-space:nowrap}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer}
.user-chip:hover{background:var(--bg3)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--text3)}

/* Topbar */
.topbar-title{font-weight:600;font-size:16px;flex:1}
.btn-icon{width:34px;height:34px;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s;border:1px solid transparent}
.btn-icon:hover{background:var(--bg3);border-color:var(--border)}
.btn-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.status-badge{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.status-badge.online{background:var(--success-light);color:var(--success)}
.status-badge.offline{background:var(--bg3);color:var(--text3)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* Cards & Grid */
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600;color:var(--text)}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.metric-label{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.metric-label svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.metric-value{font-size:26px;font-weight:700;color:var(--text);line-height:1}
.metric-sub{font-size:12px;color:var(--text3);margin-top:4px}
.metric-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.metric-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-weight:500;font-size:13.5px;cursor:pointer;transition:all .15s;border:1px solid transparent}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn-secondary{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-secondary:hover{background:var(--border);border-color:var(--border2)}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:rgba(239,68,68,.2)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-success{background:var(--success-light);color:var(--success);border-color:rgba(16,185,129,.2)}
.btn-sm{padding:5px 10px;font-size:12px}

/* Table */
.table-wrap{overflow-x:auto;border-radius:var(--radius2);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:var(--bg3);color:var(--text2);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text);font-size:13.5px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge-green{background:var(--success-light);color:var(--success)}
.badge-red{background:var(--danger-light);color:var(--danger)}
.badge-amber{background:var(--warn-light);color:var(--warn)}
.badge-blue{background:var(--info-light);color:var(--info)}
.badge-gray{background:var(--bg3);color:var(--text3)}
.badge-purple{background:var(--primary-light);color:var(--primary)}

/* Forms */
.form-grid{display:grid;gap:14px}
.form-grid-2{grid-template-columns:1fr 1fr}
.form-row{display:flex;flex-direction:column;gap:4px}
.form-section{margin-bottom:20px}
.form-section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border-radius:var(--radius2);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow2)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}

/* Auth */
#auth-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;align-items:center;justify-content:center}
#auth-screen.active{display:flex}
.auth-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow2)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:54px;height:54px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:700;margin-bottom:12px}
.auth-title{font-size:22px;font-weight:700;color:var(--text)}
.auth-sub{font-size:13.5px;color:var(--text2);margin-top:4px}
.tab-switcher{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:22px}
.tab-btn{flex:1;padding:7px;text-align:center;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);background:transparent;transition:all .2s;border:none}
.tab-btn.active{background:var(--bg2);color:var(--text);box-shadow:var(--shadow)}
.forgot-link{font-size:12.5px;color:var(--primary);cursor:pointer;text-align:right;display:block;margin-top:4px}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.alert-danger{background:var(--danger-light);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.alert-success{background:var(--success-light);color:var(--success);border:1px solid rgba(16,185,129,.2)}

/* Page sections */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.page-title{font-size:20px;font-weight:700}
.page-sub{font-size:13.5px;color:var(--text2);margin-top:2px}
.search-bar{display:flex;align-items:center;gap:1px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.search-bar svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;margin-left:10px;flex-shrink:0}
.search-bar input{border:none;background:transparent;padding:8px 12px;flex:1;box-shadow:none}
.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-row select{width:auto;min-width:140px;padding:6px 10px;font-size:13px}
.filter-row input[type="date"]{width:auto;padding:6px 10px;font-size:13px}

/* Progress bar */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--primary);transition:width .3s}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;box-shadow:var(--shadow2);display:flex;align-items:center;gap:10px;min-width:240px;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Online indicator */
.online-dot{width:9px;height:9px;border-radius:50%;background:var(--success);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Misc */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.section-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;background:var(--bg3);color:var(--text2)}
.time-display{font-variant-numeric:tabular-nums;font-size:13px;color:var(--text2)}

/* Chart container */
.chart-wrap{position:relative;height:220px;width:100%}

/* Notification dot */
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);position:absolute;top:-2px;right:-2px}

/* Responsive */
@media(max-width:768px){
#sidebar{position:fixed;inset-y:0;left:0;z-index:50}
#sidebar.collapsed{width:0}
.grid-4{grid-template-columns:1fr 1fr}
.form-grid-2{grid-template-columns:1fr}
#content{padding:16px}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.hidden{display:none!important}
.flex{display:flex}
.flex-1{flex:1}
.items-center{align-items:center}
.gap-2{gap:8px}
.gap-3{gap:12px}
.gap-4{gap:16px}
.mb-4{margin-bottom:16px}
.mb-3{margin-bottom:12px}
.mb-2{margin-bottom:8px}
.mt-2{margin-top:8px}
.text-sm{font-size:13px}
.text-xs{font-size:12px}
.text-muted{color:var(--text2)}
.font-bold{font-weight:700}
.font-600{font-weight:600}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="active">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">N</div>
      <div class="auth-title">NexServe IT Solutions</div>
      <div class="auth-sub">Employee Management System</div>
    </div>
    <div id="auth-alert" class="hidden"></div>
    <!-- Login Form -->
    <div id="form-login">
      <div class="form-row mb-3">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@nexserve.com" autocomplete="email">
      </div>
      <div class="form-row mb-2">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        <span class="forgot-link" onclick="showForgot()">Forgot password?</span>
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:10px" onclick="doLogin()">Sign In</button>
      <p style="text-align:center;margin-top:14px;font-size:12.5px;color:var(--text2)">ADMIN/EMPLOYEE:</p>
    </div>
    <!-- Forgot Password -->
    <div id="form-forgot" class="hidden">
      <div class="form-row mb-3">
        <label>Registered Email</label>
        <input type="email" id="forgot-email" placeholder="you@nexserve.com">
      </div>
      <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:10px" onclick="doForgot()">Send Reset Link</button>
      <button class="btn btn-secondary" style="width:100%;margin-top:8px;padding:10px" onclick="backToLogin()">← Back to Login</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-icon">N</div>
      <div>
        <div class="logo-text">NexServe EMS</div>
        <div class="logo-sub">IT Solutions</div>
      </div>
    </div>
    <nav id="nav-menu"></nav>
    <div class="sidebar-footer">
      <div class="user-chip" onclick="navigateTo('profile')">
        <div class="avatar" id="sb-avatar" style="background:var(--primary-light);color:var(--primary)"></div>
        <div class="user-info">
          <div class="user-name" id="sb-name">—</div>
          <div class="user-role" id="sb-role">—</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div id="main">
    <!-- Topbar -->
    <div id="topbar">
      <button class="btn-icon" onclick="toggleSidebar()" title="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-right" style="display:flex;align-items:center;gap:10px;margin-left:auto">
        <div id="live-clock" class="time-display"></div>
        <div class="status-badge" id="topbar-status"><div class="dot"></div><span id="topbar-status-text">Offline</span></div>
        <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="btn btn-danger btn-sm" id="logout-btn" onclick="initiateLogout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </div>
    <!-- Content -->
    <div id="content"></div>
  </div>
</div>

<!-- LOGOUT PRODUCTIVITY MODAL -->
<div id="logout-modal" class="modal-backdrop hidden">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <div>
        <div class="modal-title">📋 Daily Work Report</div>
        <div class="text-sm text-muted mt-2" style="margin-top:4px">Submit before logging out — this is mandatory</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-grid form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-row">
            <label>Work Category *</label>
            <select id="lr-category">
              <option value="">Select category</option>
              <option>Laptop Sales</option><option>Lead Generation</option><option>Technical Support</option>
              <option>Customer Support</option><option>AMC</option><option>Office Setup</option>
              <option>Networking</option><option>Website</option><option>Marketing</option>
              <option>Administration</option><option>Other</option>
            </select>
          </div>
          <div class="form-row">
            <label>Status *</label>
            <select id="lr-status">
              <option value="">Select status</option>
              <option>Completed</option><option>In Progress</option><option>Pending</option><option>Blocked</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>Work Title *</label>
          <input type="text" id="lr-title" placeholder="e.g. Generated 20 Leads">
        </div>
        <div class="form-row">
          <label>Work Description *</label>
          <textarea id="lr-desc" placeholder="Describe your work in detail..."></textarea>
        </div>
        <div class="form-grid form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-row">
            <label>Priority</label>
            <select id="lr-priority">
              <option>Medium</option><option>Low</option><option>High</option>
            </select>
          </div>
          <div class="form-row">
            <label>Hours Spent</label>
            <input type="number" id="lr-hours" placeholder="e.g. 4" min="0" max="24" step="0.5">
          </div>
        </div>
        <div class="form-grid form-grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-row">
            <label>Client Name (Optional)</label>
            <input type="text" id="lr-client" placeholder="Client name">
          </div>
          <div class="form-row">
            <label>Attachments (Optional)</label>
            <input type="file" id="lr-attach" accept="image/*,.pdf,.xlsx,.xls" multiple style="padding:6px">
          </div>
        </div>
        <div class="form-row">
          <label>Remarks (Optional)</label>
          <textarea id="lr-remarks" placeholder="Additional notes..." style="min-height:60px"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">

let currentUser = null;
let loginTime = null;
let currentPage = 'dashboard';
let clockInterval = null;
let pendingLogout = false;

// =====================
// UTILITIES
// =====================
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().slice(0,10)}
function nowStr(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
function fmtDate(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtTime(ts){if(!ts)return'—';return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}
function fmtDateTime(ts){if(!ts)return'—';return new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}
function hoursWorked(loginTs,logoutTs){
  if(!loginTs)return 0;
  const end=logoutTs?new Date(logoutTs):new Date();
  return Math.max(0,((end-new Date(loginTs))/3600000)).toFixed(2);
}
function getInitials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,type='success'){
  const t=document.getElementById('toast');
  const el=document.createElement('div');
  const colors={success:'var(--success)',danger:'var(--danger)',warn:'var(--warn)',info:'var(--info)'};
  el.className='toast-item';
  el.innerHTML=`<div class="toast-dot" style="background:${colors[type]||colors.success}"></div>${escHtml(msg)}`;
  t.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function getUsers(){return DB.get('users')||[]}
function saveUsers(u){DB.set('users',u)}
function getAttendance(){return DB.get('attendance')||[]}
function saveAttendance(a){DB.set('attendance',a)}
function getReports(){return DB.get('reports')||[]}

function getNotifications(){return DB.get('notifications')||[]}

function getAuditLogs(){return DB.get('auditLogs')||[]}
function saveAuditLogs(l){DB.set('auditLogs',l)}
function addNotification(title,msg,forUserId='all'){
  const ns=getNotifications();
  ns.unshift({id:uid(),title,msg,forUserId,time:Date.now(),read:false});
  saveNotifications(ns.slice(0,100));
}
function addAuditLog(action,detail,userId){
  const logs=getAuditLogs();
  logs.unshift({id:uid(),action,detail,userId,time:Date.now(),ip:'192.168.1.'+Math.floor(Math.random()*250+1)});
  saveAuditLogs(logs.slice(0,200));
}
function statusBadge(s){
  const m={Completed:'badge-green',Inprogress:'badge-blue','In Progress':'badge-blue',Pending:'badge-amber',Blocked:'badge-red',Online:'badge-green',Offline:'badge-gray',online:'badge-green',offline:'badge-gray',High:'badge-red',Medium:'badge-amber',Low:'badge-blue'};
  return `<span class="badge ${m[s]||'badge-gray'}">${escHtml(s)}</span>`;
}

function showForgot(){
  document.getElementById('form-login').classList.add('hidden');
  document.getElementById('form-forgot').classList.remove('hidden');
  clearAuthAlert();
}
function backToLogin(){
  document.getElementById('form-forgot').classList.add('hidden');
  document.getElementById('form-login').classList.remove('hidden');
  clearAuthAlert();
}
function clearAuthAlert(){const a=document.getElementById('auth-alert');a.className='hidden';a.textContent=''}
function showAuthAlert(msg,type='danger'){
  const a=document.getElementById('auth-alert');
  a.className=`alert alert-${type}`;a.textContent=msg;
}
function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pass=document.getElementById('login-password').value;
  if(!email||!pass){showAuthAlert('Please enter email and password');return}
  const users=getUsers();
  const user=users.find(u=>u.email.toLowerCase()===email&&u.password===pass);
  if(!user){showAuthAlert('Invalid credentials. Please try again.');return}
  currentUser=user;
  loginTime=Date.now();
  // Record attendance
  const att=getAttendance();
  const existing=att.find(a=>a.userId===user.id&&a.date===today()&&!a.logoutTime);
  if(!existing){
    att.push({id:uid(),userId:user.id,date:today(),loginTime:loginTime,logoutTime:null,hours:0,report:null});
    saveAttendance(att);
  }
  // Update user status
  const us=getUsers();
  const ui=us.findIndex(u=>u.id===user.id);
  if(ui>=0){us[ui].status='online';us[ui].lastLogin=loginTime;saveUsers(us);currentUser=us[ui]}
  addNotification('Employee Login',`${user.name} logged in`,user.role==='admin'?'all':user.id);
  addAuditLog('LOGIN',`${user.name} logged in from browser`,user.id);
  document.getElementById('auth-screen').classList.remove('active');
  initUI();
  toast(`Welcome back, ${user.name.split(' ')[0]}! 👋`,'success');
}
function doForgot(){
  const email=document.getElementById('forgot-email').value.trim();
  if(!email){showAuthAlert('Please enter your email');return}
  const users=getUsers();
  const user=users.find(u=>u.email.toLowerCase()===email.toLowerCase());
  if(!user){showAuthAlert('No account found with this email','danger');return}
  showAuthAlert(`Password reset link sent to ${email}. (Demo: check your email)  — Password: ${user.password}`,'success');
}

function renderWeekAttendance(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat'];
  const att=getAttendance().filter(a=>a.userId===currentUser.id);
  const now=new Date();
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-now.getDay()+1);
  const rows=days.map((_,i)=>{
    const d=new Date(weekStart);d.setDate(weekStart.getDate()+i);
    const dateStr=d.toISOString().slice(0,10);
    const rec=att.find(a=>a.date===dateStr);
    const isToday=dateStr===today();
    const isFuture=d>new Date();
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="width:36px;text-align:center;font-size:12px;font-weight:600;color:${isToday?'var(--primary)':'var(--text2)'}">${days[i]}</div>
      <div style="font-size:12px;color:var(--text3);width:72px">${d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'})}</div>
      ${isFuture?'<span class="badge badge-gray">—</span>':
        rec?`<span class="badge badge-green">Present</span><span style="font-size:12px;color:var(--text2);margin-left:auto">${hoursWorked(rec.loginTime,rec.logoutTime)}h</span>`:
        '<span class="badge badge-red">Absent</span>'}
    </div>`;
  });
  return rows.join('');
}

function renderAttBody(att,users,isAdmin){
  if(att.length===0)return`<tr><td colspan="7" style="text-align:center;padding:30px;color:var(--text3)">No attendance records found</td></tr>`;
  return att.slice(0,100).map(a=>{
    const u=users.find(u=>u.id===a.userId);
    const hasReport=!!a.report;
    return`<tr>
      ${isAdmin?`<td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:${u?.avatarBg||'var(--primary)'};color:#fff">${u?.avatar||'?'}</div>${escHtml(u?.name||'?')}</div></td>`:''}
      <td>${fmtDate(a.date)}</td>
      <td>${fmtTime(a.loginTime)}</td>
      <td>${a.logoutTime?fmtTime(a.logoutTime):'<span class="badge badge-green"><span class="online-dot"></span>Active</span>'}</td>
      <td>${hoursWorked(a.loginTime,a.logoutTime)}h</td>
      <td>${statusBadge(a.logoutTime?'Offline':'Online')}</td>
      <td>${hasReport?`<span class="badge badge-green">Submitted</span>`:a.logoutTime?`<span class="badge badge-red">Missing</span>`:'<span class="badge badge-gray">—</span>'}</td>
    </tr>`;
  }).join('');
}

function reRenderAttendance(){
  const isAdmin=currentUser.role==='admin';
  const dateVal=document.getElementById('att-date')?.value||'';
  const userVal=isAdmin?document.getElementById('att-user')?.value||'':'';
  let att=getAttendance();
  if(!isAdmin)att=att.filter(a=>a.userId===currentUser.id);
  if(dateVal)att=att.filter(a=>a.date===dateVal);
  if(userVal)att=att.filter(a=>a.userId===userVal);
  att=att.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const users=getUsers();
  const tbody=document.getElementById('att-tbody');
  if(tbody)tbody.innerHTML=renderAttBody(att,users,isAdmin);
}

function exportAttendanceCSV(){
  const att=getAttendance();const users=getUsers();
  const rows=[['Employee','Email','Date','Login Time','Logout Time','Hours','Report Submitted']];
  att.forEach(a=>{
    const u=users.find(u=>u.id===a.userId);
    rows.push([u?.name||'?',u?.email||'?',a.date,fmtTime(a.loginTime),a.logoutTime?fmtTime(a.logoutTime):'Active',hoursWorked(a.loginTime,a.logoutTime),a.report?'Yes':'No']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  downloadFile(csv,'attendance.csv','text/csv');
  toast('Attendance exported!','success');
}

function downloadFile(content,filename,type){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

function renderReportBody(reports,users){
  if(reports.length===0)return`<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text3)">No reports found</td></tr>`;
  return reports.slice(0,100).map(r=>{
    const u=users.find(u=>u.id===r.userId);
    return`<tr onclick="viewReport('${r.id}')" style="cursor:pointer">
      <td>${escHtml(u?.name||'?')}</td>
      <td>${fmtDate(r.date)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escHtml(r.title)}">${escHtml(r.title)}</td>
      <td><span class="chip">${escHtml(r.category)}</span></td>
      <td>${statusBadge(r.status)}</td>
      <td>${statusBadge(r.priority||'Medium')}</td>
      <td>${r.hours||'—'}h</td>
      <td>${escHtml(r.client||'—')}</td>
    </tr>`;
  }).join('');
}

function reRenderReports(){
  let reports=getReports().sort((a,b)=>b.createdAt-a.createdAt);
  const dateVal=document.getElementById('rpt-date')?.value||'';
  const userVal=document.getElementById('rpt-user')?.value||'';
  const catVal=document.getElementById('rpt-cat')?.value||'';
  const stVal=document.getElementById('rpt-status')?.value||'';
  if(dateVal)reports=reports.filter(r=>r.date===dateVal);
  if(userVal)reports=reports.filter(r=>r.userId===userVal);
  if(catVal)reports=reports.filter(r=>r.category===catVal);
  if(stVal)reports=reports.filter(r=>r.status===stVal);
  const tbody=document.getElementById('rpt-tbody');
  if(tbody)tbody.innerHTML=renderReportBody(reports,getUsers());
}

  openGenericModal('Work Report Details',`

    </div>
    <table style="width:100%;font-size:13px;margin-bottom:14px">
      <tr><td style="color:var(--text2);padding:5px 0;width:120px">Employee</td><td>${escHtml(u?.name||'?')}</td></tr>
      <tr><td style="color:var(--text2);padding:5px 0">Date</td><td>${fmtDate(r.date)}</td></tr>

function exportReportsCSV(){
  const reports=getReports();const users=getUsers();
  const rows=[['Employee','Date','Title','Category','Status','Priority','Hours','Client','Description']];
  reports.forEach(r=>{
    const u=users.find(u=>u.id===r.userId);
    rows.push([u?.name||'?',r.date,r.title,r.category,r.status,r.priority||'Medium',r.hours||0,r.client||'',r.desc||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadFile(csv,'reports.csv','text/csv');
  toast('Reports exported!','success');
}

function exportReportsXLSX(){
  if(typeof XLSX==='undefined'){toast('XLSX library not loaded','danger');return}
  const reports=getReports();const users=getUsers();
  const data=reports.map(r=>{
    const u=users.find(u=>u.id===r.userId);
    return{Employee:u?.name||'?',Date:r.date,Title:r.title,Category:r.category,Status:r.status,Priority:r.priority||'Medium',Hours:r.hours||0,Client:r.client||'',Description:r.desc||''};
  });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Reports');
  XLSX.writeFile(wb,'nexserve_reports.xlsx');
  toast('XLSX exported!','success');
}

// --- ANALYTICS ---
function renderAnalytics(el){
  if(currentUser.role!=='admin'){el.innerHTML='<div class="empty-state">Access denied</div>';return}
  const reports=getReports();
  const att=getAttendance();
  const users=getUsers().filter(u=>u.role==='employee');

  // Category breakdown
  const catCount={};
  reports.forEach(r=>{catCount[r.category]=(catCount[r.category]||0)+1});
  const statusCount={Completed:0,'In Progress':0,Pending:0,Blocked:0};
  reports.forEach(r=>{if(statusCount.hasOwnProperty(r.status))statusCount[r.status]++});

  // Hours per employee
  const empHours={};
  att.forEach(a=>{empHours[a.userId]=(empHours[a.userId]||0)+parseFloat(hoursWorked(a.loginTime,a.logoutTime))});

  el.innerHTML=`
  <div class="page-header"><div class="page-title">Analytics</div></div>
  <div class="grid grid-4 mb-4">
    ${metricCard('<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>',users.length,'Total Employees','Active workforce','#4f46e5','var(--primary-light)')}
    ${metricCard('<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>',reports.length,'Total Reports','All submissions','#10b981','var(--success-light)')}
    ${metricCard('<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8"><polyline points="9,11 12,14 22,4"/></svg>',statusCount.Completed,'Completed Tasks','','#f59e0b','var(--warn-light)')}
    ${metricCard('<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>',Object.values(empHours).reduce((s,h)=>s+h,0).toFixed(0)+'h','Total Hours','Across all employees','#3b82f6','var(--info-light)')}
  </div>
  <div class="grid grid-2 mb-4">
    <div class="card">
      <div class="card-header"><div class="card-title">Reports by Category</div></div>
      <div class="chart-wrap"><canvas id="chart-cat"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Reports by Status</div></div>
      <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Employee Productivity (Total Hours)</div></div>
    <div class="chart-wrap" style="height:260px"><canvas id="chart-emp"></canvas></div>
  </div>`;

  setTimeout(()=>{
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const textColor=isDark?'#9ba3b5':'#5a6270';
    Chart.defaults.color=textColor;

    new Chart(document.getElementById('chart-cat'),{
      type:'doughnut',
      data:{labels:Object.keys(catCount),datasets:[{data:Object.values(catCount),backgroundColor:['#4f46e5','#10b981','#f59e0b','#ef4444','#3b82f6','#8b5cf6','#06b6d4','#f97316','#14b8a6','#ec4899','#6b7280'],borderWidth:2,borderColor:'transparent'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:12},padding:12}}}}
    });

    new Chart(document.getElementById('chart-status'),{
      type:'bar',
      data:{labels:Object.keys(statusCount),datasets:[{data:Object.values(statusCount),backgroundColor:['#10b981','#3b82f6','#f59e0b','#ef4444'],borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},x:{grid:{display:false}}}}
    });

    const empLabels=users.map(u=>u.name.split(' ')[0]);
    const empData=users.map(u=>parseFloat((empHours[u.id]||0).toFixed(1)));
    new Chart(document.getElementById('chart-emp'),{
      type:'bar',
      data:{labels:empLabels,datasets:[{label:'Hours Worked',data:empData,backgroundColor:'#4f46e5',borderRadius:6,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}},x:{grid:{display:false}}}}
    });
  },100);
}

function saveProfile(){
  const name=document.getElementById('prof-name').value.trim();
  const phone=document.getElementById('prof-phone').value.trim();
  const curPass=document.getElementById('prof-curpass').value;
  const newPass=document.getElementById('prof-newpass').value;
  const users=getUsers();
  const idx=users.findIndex(u=>u.id===currentUser.id);
  if(idx<0)return;
  if(curPass&&curPass!==users[idx].password){toast('Current password is incorrect','danger');return}
  if(name)users[idx].name=name;
  if(phone)users[idx].phone=phone;
  if(newPass){
    if(newPass.length<6){toast('Password must be at least 6 characters','danger');return}
    users[idx].password=newPass;
  }
  users[idx].avatar=getInitials(users[idx].name);
  saveUsers(users);
  currentUser=users[idx];
  updateSidebar();
  toast('Profile updated!','success');
  navigateTo('profile');
}

// =====================
// LOGOUT FLOW
// =====================
function initiateLogout(){
  pendingLogout=true;
  document.getElementById('logout-modal').classList.remove('hidden');
}

function cancelLogout(){
  pendingLogout=false;
  document.getElementById('logout-modal').classList.add('hidden');
  resetLogoutForm();
}

function resetLogoutForm(){
  ['lr-category','lr-status','lr-title','lr-desc','lr-remarks','lr-client','lr-hours'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  const pri=document.getElementById('lr-priority');if(pri)pri.value='Medium';
}

function submitLogoutReport(){
  const cat=document.getElementById('lr-category').value;
  const status=document.getElementById('lr-status').value;
  const title=document.getElementById('lr-title').value.trim();
  const desc=document.getElementById('lr-desc').value.trim();
  if(!cat){toast('Please select work category','danger');return}
  if(!status){toast('Please select status','danger');return}
  if(!title){toast('Please enter work title','danger');return}
  if(!desc){toast('Please enter work description','danger');return}

  const report={
    id:uid(),
    userId:currentUser.id,
    date:today(),
    category:cat,
    title,
    desc,
    status,
    priority:document.getElementById('lr-priority').value||'Medium',
    hours:document.getElementById('lr-hours').value||0,
    client:document.getElementById('lr-client').value.trim(),
    remarks:document.getElementById('lr-remarks').value.trim(),
    createdAt:Date.now()
  };

  const reports=getReports();reports.push(report);saveReports(reports);

  // Update attendance
  const att=getAttendance();
  const todayRec=att.findIndex(a=>a.userId===currentUser.id&&a.date===today()&&!a.logoutTime);
  const logoutTime=Date.now();
  if(todayRec>=0){att[todayRec].logoutTime=logoutTime;att[todayRec].hours=hoursWorked(att[todayRec].loginTime,logoutTime);att[todayRec].report=report.id;saveAttendance(att);}

  // Update user status
  const users=getUsers();
  const ui=users.findIndex(u=>u.id===currentUser.id);
  if(ui>=0){users[ui].status='offline';saveUsers(users);}

  addNotification('Report Submitted',`${currentUser.name} submitted work report`,'all');
  addAuditLog('LOGOUT',`${currentUser.name} logged out`,currentUser.id);

  document.getElementById('logout-modal').classList.add('hidden');
  resetLogoutForm();
  currentUser=null;loginTime=null;pendingLogout=false;
  if(clockInterval)clearInterval(clockInterval);
  document.getElementById('auth-screen').classList.add('active');
  document.getElementById('login-email').value='';
  document.getElementById('login-password').value='';
  toast('Logged out successfully. Report saved!','success');
}
